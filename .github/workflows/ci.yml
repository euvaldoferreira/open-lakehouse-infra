name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # 1. Validação de YAML — compose files e configurações
  # ---------------------------------------------------------------------------
  validate-yaml:
    name: Validate YAML (yamllint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements-ci.txt

      - name: Lint YAML files
        run: yamllint infra/ --config-file .yamllint.yml

  # ---------------------------------------------------------------------------
  # 2. Lint de Dockerfiles — boas práticas e segurança
  # ---------------------------------------------------------------------------
  lint-dockerfiles:
    name: Lint Dockerfiles (hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          config: .hadolint.yaml
          failure-threshold: error

  # ---------------------------------------------------------------------------
  # 3. Lint de shell scripts — bugs e armadilhas comuns
  # ---------------------------------------------------------------------------
  lint-scripts:
    name: Lint Shell Scripts (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          scandir: .

  # ---------------------------------------------------------------------------
  # 4. Auditoria de dependências Python — CVEs em todos os requirements pinados
  # ---------------------------------------------------------------------------
  security-audit:
    name: Security Audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements-ci.txt

      - name: Audit Airflow providers
        run: |
          # Instala SOMENTE os pacotes listados em airflow/requirements.txt,
          # sem dependências transitivas (--no-deps). Isso evita que o pip
          # resolva e instale apache-airflow (core) e suas centenas de deps,
          # mantendo o escopo no que explicitamente controlamos.
          python -m venv /tmp/airflow-audit
          /tmp/airflow-audit/bin/pip install --upgrade pip -q
          /tmp/airflow-audit/bin/pip install --no-deps -q -r airflow/requirements.txt
          /tmp/airflow-audit/bin/pip install -q pip-audit
          # Providers com CVE que exigem major upgrade (incompatível com Airflow 2.9.1):
          # GHSA-8q28-pw9g-w82c: providers-apache-spark (sem versão de fix disponível)
          # GHSA-rv5f-ccpm-xjj4: providers-amazon (fix: 9.22.0, major)
          # GHSA-9r5j-7r2x-rv4g: providers-http   (fix: 6.0.0,  major)
          /tmp/airflow-audit/bin/pip-audit --local \
            --ignore-vuln GHSA-8q28-pw9g-w82c \
            --ignore-vuln GHSA-rv5f-ccpm-xjj4 \
            --ignore-vuln GHSA-9r5j-7r2x-rv4g

      - name: Audit Notebook dependencies
        run: pip-audit -r notebooks/requirements.txt

      - name: Audit Notebook runner dependencies
        run: pip-audit -r notebooks/runner/requirements.txt

  # ---------------------------------------------------------------------------
  # 5. SAST — análise estática em scripts Python de configuração
  #    Threshold: somente severidade MEDIUM e acima (-ll)
  #    Falsos positivos configurados em pyproject.toml
  # ---------------------------------------------------------------------------
  sast:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements-ci.txt

      - name: Run bandit
        run: |
          bandit -r \
            airflow/webserver_config.py \
            superset/superset_config.py \
            notebooks/runner/main.py \
            notebooks/jupyter_server_config.py \
            -ll -c pyproject.toml
