apiVersion: apps/v1
kind: Deployment
metadata:
  name: debezium
  namespace: lakehouse
  labels:
    app: debezium
    app.kubernetes.io/part-of: lakehouse-streaming
spec:
  replicas: 1
  selector:
    matchLabels:
      app: debezium
  template:
    metadata:
      labels:
        app: debezium
        app.kubernetes.io/part-of: lakehouse-streaming
    spec:
      containers:
        - name: debezium
          image: debezium/connect:2.7
          ports:
            - containerPort: 8083
              name: rest
          env:
            - name: BOOTSTRAP_SERVERS
              value: "kafka:9092"
            - name: GROUP_ID
              value: "lakehouse-debezium"
            - name: CONFIG_STORAGE_TOPIC
              value: "debezium.configs"
            - name: OFFSET_STORAGE_TOPIC
              value: "debezium.offsets"
            - name: STATUS_STORAGE_TOPIC
              value: "debezium.statuses"
            - name: CONFIG_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: OFFSET_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: STATUS_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_REST_ADVERTISED_HOST_NAME
              value: "debezium"
            - name: KEY_CONVERTER
              value: "org.apache.kafka.connect.json.JsonConverter"
            - name: VALUE_CONVERTER
              value: "org.apache.kafka.connect.json.JsonConverter"
            - name: KEY_CONVERTER_SCHEMAS_ENABLE
              value: "false"
            - name: VALUE_CONVERTER_SCHEMAS_ENABLE
              value: "false"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /connectors
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /connectors
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
