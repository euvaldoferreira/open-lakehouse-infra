# =============================================================================
# Prometheus Configuration - Lakehouse Platform
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    platform: lakehouse
    environment: development

rule_files:
  - /etc/prometheus/alerts.yml
  - /etc/prometheus/ons_alerts.yml

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
    metrics_path: /metrics
    scheme: http

  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    scheme: http
    static_configs:
      - targets: ["minio:9000"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: airflow
    metrics_path: /metrics
    static_configs:
      - targets: ["airflow-webserver:8080"]

  - job_name: spark-master
    static_configs:
      - targets: ["spark-master:8081"]
    metrics_path: /metrics/json
    scheme: http
