# =============================================================================
# Apache Ranger Admin - Install Properties
# Os placeholders {{VAR}} são substituídos pelo bootstrap.sh via variáveis de ambiente.
# =============================================================================

PYTHON_COMMAND_INVOKER=python3

# --- Banco de Dados ---
DB_FLAVOR=POSTGRES
SQL_CONNECTOR_JAR=/opt/ranger-admin/ews/lib/postgresql-42.7.3.jar

db_root_user={{DB_ROOT_USER}}
db_root_password={{DB_ROOT_PASSWORD}}
db_host={{DB_HOST}}:{{DB_PORT}}
db_name={{DB_NAME}}
db_user={{DB_USER}}
db_password={{DB_PASSWORD}}

# --- Credenciais do Admin Ranger ---
rangerAdmin_user={{RANGER_ADMIN_USER}}
rangerAdmin_password={{RANGER_ADMIN_PASSWORD}}
rangerTagsync_password=rangerTagsync_2024!
rangerUsersync_password=rangerUsersync_2024!
keyadmin_password=keyadmin_2024!

# --- Auditoria (Solr) ---
audit_store=solr
audit_solr_urls=http://{{AUDIT_SOLR_HOST}}:{{AUDIT_SOLR_PORT}}/solr/ranger_audits
audit_solr_user=
audit_solr_password=
audit_solr_zookeepers=
audit_to_db_enabled=false
audit_to_hdfs_enabled=false

# --- Serviço Ranger Admin ---
policymgr_external_url={{POLICY_MGR_URL}}
policymgr_http_enabled=true
policymgr_https_enabled=false

# --- Unix User ---
unix_user=ranger
unix_user_pwd=
unix_group=ranger

# --- Misc ---
hadoop_conf=/etc/hadoop/conf
RANGER_ADMIN_LOG_DIR=/opt/ranger-admin/ews/logs
RANGER_PID_DIR_PATH=/var/run/ranger

xa_ldap_url=
xa_ldap_userDNpattern=
xa_ldap_groupSearchBase=
xa_ldap_groupSearchFilter=
xa_ldap_groupRoleAttribute=
xa_ldap_base_dn=
xa_ldap_bind_dn=
xa_ldap_bind_password=
xa_ldap_referral=ignore
xa_ldap_userSearchFilter=
