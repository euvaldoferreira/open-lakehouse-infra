# =============================================================================
# BIGDATA LAKEHOUSE PLATFORM - Docker Compose
# Version: 1.0.0
# =============================================================================

x-airflow-common: &airflow-common
  build:
    context: ../airflow
    dockerfile: Dockerfile
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    AIRFLOW__LOGGING__REMOTE_LOGGING: "false"
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: 30
    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: 30
    MINIO_ENDPOINT: ${MINIO_ENDPOINT}
    MINIO_ROOT_USER: ${MINIO_ROOT_USER}
    MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    SPARK_MASTER_URL: spark://spark-master:7077
    NOTEBOOK_RUNNER_URL: http://notebook-runner:8000
  volumes:
    - ${PIPELINES_REPO}/dags:/opt/airflow/dags:ro
    - ${PIPELINES_REPO}/plugins:/opt/airflow/plugins:ro
    - airflow_logs:/opt/airflow/logs
  networks:
    - backend_network
  depends_on:
    postgres:
      condition: service_healthy
  restart: unless-stopped
  user: "${AIRFLOW_UID}:${AIRFLOW_GID}"

x-spark-common: &spark-common
  build:
    context: ../spark
    dockerfile: Dockerfile
  env_file: .env
  environment:
    AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
    AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    AWS_ENDPOINT_URL: ${MINIO_ENDPOINT}
  networks:
    - backend_network
    - data_network
  restart: unless-stopped

# =============================================================================
# SERVICES
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # POSTGRESQL - Metadata Store
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15.6-alpine
    container_name: lakehouse-postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../storage/scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ../storage/scripts/init_extra.sh:/docker-entrypoint-initdb.d/init_extra.sh:ro
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEM_LIMIT}
          cpus: "${POSTGRES_CPU_LIMIT}"
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # MINIO - Object Storage (S3 Compatible)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    container_name: lakehouse-minio
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - frontend_network
      - backend_network
      - data_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${MINIO_MEM_LIMIT}
          cpus: "${MINIO_CPU_LIMIT}"
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # MINIO INIT - Bucket and Policy Setup
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:RELEASE.2024-05-09T17-04-24Z
    container_name: lakehouse-minio-init
    env_file: .env
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ../storage/scripts/init_minio.sh:/init_minio.sh:ro
    entrypoint: ["/bin/sh", "/init_minio.sh"]
    networks:
      - backend_network
    restart: on-failure

  # ---------------------------------------------------------------------------
  # AIRFLOW - Init DB
  # ---------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: lakehouse-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db upgrade
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email ${AIRFLOW_ADMIN_EMAIL} \
          --password ${AIRFLOW_ADMIN_PASSWORD}
    restart: on-failure

  # ---------------------------------------------------------------------------
  # AIRFLOW - Webserver
  # ---------------------------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: lakehouse-airflow-webserver
    command: webserver
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8080}:8080"
    networks:
      - frontend_network
      - backend_network
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: ${AIRFLOW_WEBSERVER_MEM_LIMIT}

  # ---------------------------------------------------------------------------
  # AIRFLOW - Scheduler
  # ---------------------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: lakehouse-airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: ${AIRFLOW_SCHEDULER_MEM_LIMIT}

  # ---------------------------------------------------------------------------
  # AIRFLOW - Triggerer
  # ---------------------------------------------------------------------------
  airflow-triggerer:
    <<: *airflow-common
    container_name: lakehouse-airflow-triggerer
    command: triggerer
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # SPARK - Master
  # ---------------------------------------------------------------------------
  spark-master:
    <<: *spark-common
    container_name: lakehouse-spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8081
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${SPARK_MASTER_WEBUI_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: ${SPARK_MASTER_MEM_LIMIT}

  # ---------------------------------------------------------------------------
  # SPARK - Worker
  # ---------------------------------------------------------------------------
  spark-worker:
    <<: *spark-common
    container_name: lakehouse-spark-worker
    command: ["bash", "-c", "mkdir -p /tmp/spark-local && /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077"]
    environment:
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY}
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES}
      SPARK_WORKER_WEBUI_PORT: 8082
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      SPARK_LOCAL_DIRS: /tmp/spark-local
    depends_on:
      spark-master:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: ${SPARK_WORKER_MEM_LIMIT}

  # ---------------------------------------------------------------------------
  # JUPYTERLAB
  # ---------------------------------------------------------------------------
  jupyter:
    build:
      context: ../notebooks
      dockerfile: Dockerfile
    container_name: lakehouse-jupyter
    env_file: .env
    environment:
      JUPYTER_TOKEN: ${JUPYTER_TOKEN}
      JUPYTER_PASSWORD: ${JUPYTER_PASSWORD}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      SPARK_MASTER_URL: spark://spark-master:7077
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      SPARK_HOME: /usr/local/spark
      PYTHONPATH: /usr/local/spark/python:/usr/local/spark/python/lib/py4j-0.10.9.7-src.zip
      PYSPARK_PYTHON: /opt/conda/bin/python3
      PYSPARK_DRIVER_PYTHON: /opt/conda/bin/python3
      GIT_USER_NAME: ${GIT_USER_NAME:-}
      GIT_USER_EMAIL: ${GIT_USER_EMAIL:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - ${PIPELINES_REPO}:/home/jovyan/work/pipelines:rw
      - ../notebooks/exploratory:/home/jovyan/work/exploratory:rw
      - notebooks_output:/home/jovyan/output
      - jupyter_data:/home/jovyan/.local
      - ../notebooks/jupyter_server_config.py:/etc/jupyter/jupyter_server_config.py:ro
    ports:
      - "${JUPYTER_PORT:-8888}:8888"
    networks:
      - frontend_network
      - backend_network
      - data_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${JUPYTER_MEM_LIMIT}
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # NOTEBOOK RUNNER - Option 2: Papermill via REST API (dedicated container)
  # ---------------------------------------------------------------------------
  notebook-runner:
    build:
      context: ../notebooks/runner
      dockerfile: Dockerfile
    container_name: lakehouse-notebook-runner
    env_file: .env
    environment:
      NOTEBOOKS_INPUT: /notebooks/input
      NOTEBOOKS_OUTPUT: /notebooks/output
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ${PIPELINES_REPO}/notebooks:/notebooks/input:ro
      - notebooks_output:/notebooks/output
      - runner_db:/notebooks/db
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${NOTEBOOK_RUNNER_MEM_LIMIT:-1g}
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # HIVE METASTORE - Shared Iceberg Catalog (Spark + Trino)
  # ---------------------------------------------------------------------------
  hive-metastore:
    build:
      context: ../hive-metastore
      dockerfile: Dockerfile
    container_name: lakehouse-hive-metastore
    env_file: .env
    environment:
      HMS_DB_NAME: ${HMS_DB_NAME}
      HMS_DB_USER: ${HMS_DB_USER}
      HMS_DB_PASSWORD: ${HMS_DB_PASSWORD}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - backend_network
      - data_network
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9083 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${HMS_MEM_LIMIT:-512m}
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # ELASTICSEARCH - Search engine for OpenMetadata
  # ---------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.16.3
    container_name: lakehouse-elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${ELASTICSEARCH_MEM_LIMIT:-1g}
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # TRINO - Distributed SQL Query Engine
  # ---------------------------------------------------------------------------
  trino:
    image: trinodb/trino:443
    container_name: lakehouse-trino
    env_file: .env
    volumes:
      - ../trino/etc:/etc/trino:ro
    ports:
      - "${TRINO_PORT:-8084}:8080"
    networks:
      - frontend_network
      - backend_network
      - data_network
    depends_on:
      hive-metastore:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${TRINO_MEM_LIMIT:-2g}
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # SUPERSET - Init (one-shot)
  # ---------------------------------------------------------------------------
  superset-init:
    build:
      context: ../superset
      dockerfile: Dockerfile
    container_name: lakehouse-superset-init
    env_file: .env
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_DB_USER: ${SUPERSET_DB_USER}
      SUPERSET_DB_PASSWORD: ${SUPERSET_DB_PASSWORD}
      SUPERSET_DB_NAME: ${SUPERSET_DB_NAME}
      SUPERSET_ADMIN_USER: ${SUPERSET_ADMIN_USER}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL}
      PYTHONPATH: /app/pythonpath
    command: ["/bin/bash", "/app/init.sh"]
    volumes:
      - ../superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - ../superset/init.sh:/app/init.sh:ro
    networks:
      - backend_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # ---------------------------------------------------------------------------
  # SUPERSET - BI and Dashboards
  # ---------------------------------------------------------------------------
  superset:
    build:
      context: ../superset
      dockerfile: Dockerfile
    container_name: lakehouse-superset
    env_file: .env
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_DB_USER: ${SUPERSET_DB_USER}
      SUPERSET_DB_PASSWORD: ${SUPERSET_DB_PASSWORD}
      SUPERSET_DB_NAME: ${SUPERSET_DB_NAME}
      SUPERSET_PORT: ${SUPERSET_PORT:-8088}
      PYTHONPATH: /app/pythonpath
    volumes:
      - ../superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - superset_home:/app/superset_home
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    networks:
      - frontend_network
      - backend_network
    depends_on:
      superset-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${SUPERSET_MEM_LIMIT:-1g}
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # OPENMETADATA - Data Catalog and Lineage
  # ---------------------------------------------------------------------------
  openmetadata:
    image: openmetadata/server:1.4.7
    container_name: lakehouse-openmetadata
    env_file: .env
    environment:
      OPENMETADATA_CLUSTER_NAME: lakehouse
      DB_DRIVER_CLASS: org.postgresql.Driver
      DB_SCHEME: postgresql
      DB_PARAMS: ""
      DB_USER: ${OPENMETADATA_DB_USER}
      DB_USER_PASSWORD: ${OPENMETADATA_DB_PASSWORD}
      DB_HOST: postgres
      DB_PORT: "5432"
      OM_DATABASE: ${OPENMETADATA_DB_NAME}
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: "9200"
      ELASTICSEARCH_SCHEME: http
      ELASTICSEARCH_INDEX_MAPPING_LANG: EN
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8585"
      SERVER_ADMIN_PORT: "8586"
      SERVER_HTTPS_ENABLED: "false"
      PIPELINE_SERVICE_CLIENT_ENABLED: "false"
      AUTHENTICATION_PROVIDER: basic
      AUTHENTICATION_PUBLIC_KEYS: "[http://openmetadata:8585/api/v1/system/config/jwks]"
      AUTHORIZER_CLASS_NAME: org.openmetadata.service.security.DefaultAuthorizer
      AUTHORIZER_REQUEST_FILTER: org.openmetadata.service.security.JwtFilter
      AUTHORIZER_ADMIN_PRINCIPALS: "[admin]"
      AUTHORIZER_PRINCIPAL_DOMAIN: open-metadata.org
      AUTHORIZER_ENFORCE_PRINCIPAL_DOMAIN: "false"
      AUTHORIZER_ENABLE_SECURE_SOCKET: "false"
      JWT_ISSUER: open-metadata.org
      JWT_KEY_ID: Gb389a-9f76-gdjs-a92j-0242bk94356
      RSA_PUBLIC_KEY_FILE_PATH: ""
      RSA_PRIVATE_KEY_FILE_PATH: ""
    ports:
      - "${OPENMETADATA_PORT:-8585}:8585"
    networks:
      - frontend_network
      - backend_network
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8585/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${OPENMETADATA_MEM_LIMIT:-2g}
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # CLOUDFLARE TUNNEL - Secure public access via Cloudflare Zero Trust
  # ---------------------------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: lakehouse-cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - frontend_network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # PROMETHEUS
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: lakehouse-prometheus
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ../monitoring/prometheus/ons_alerts.yml:/etc/prometheus/ons_alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    networks:
      - backend_network
      - frontend_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${PROMETHEUS_MEM_LIMIT}
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # GRAFANA
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.2
    container_name: lakehouse-grafana
    env_file: .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:${GRAFANA_PORT}"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - frontend_network
      - backend_network
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${GRAFANA_MEM_LIMIT}
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # LOKI - Log Aggregation
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:2.9.8
    container_name: lakehouse-loki
    volumes:
      - ../monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${LOKI_MEM_LIMIT}
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # PROMTAIL - Log Shipper
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:2.9.8
    container_name: lakehouse-promtail
    volumes:
      - ../monitoring/loki/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - airflow_logs:/airflow/logs:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - backend_network
    depends_on:
      - loki
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

# =============================================================================
# NETWORKS
# =============================================================================

networks:
  frontend_network:
    name: lakehouse_frontend
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

  backend_network:
