# =============================================================================
# Spark Defaults Configuration - Lakehouse Platform
# =============================================================================

# --- Iceberg Catalog (Hive Metastore) ---
spark.sql.extensions                            org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.lakehouse                     org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.lakehouse.type                hive
spark.sql.catalog.lakehouse.uri                 thrift://hive-metastore:9083
spark.sql.catalog.lakehouse.warehouse           s3a://gold/warehouse
spark.sql.defaultCatalog                        lakehouse

# --- S3A / MinIO ---
spark.hadoop.fs.s3a.impl                        org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.path.style.access           true
spark.hadoop.fs.s3a.endpoint                    http://minio:9000
spark.hadoop.fs.s3a.connection.ssl.enabled      false
spark.hadoop.fs.s3a.fast.upload                 true
spark.hadoop.fs.s3a.multipart.size              67108864
spark.hadoop.fs.s3a.connection.maximum          100

# --- Performance ---
spark.sql.shuffle.partitions            8
spark.default.parallelism               8
spark.sql.adaptive.enabled              true
spark.sql.adaptive.coalescePartitions.enabled true

# --- Python ---
spark.pyspark.python                    /opt/conda/bin/python3.11
spark.executorEnv.PYSPARK_PYTHON        /opt/conda/bin/python3.11

# --- Serialization ---
spark.serializer                        org.apache.spark.serializer.KryoSerializer

# --- UI ---
spark.ui.enabled                        true
spark.ui.port                           4040

# --- Dynamic Allocation ---
spark.dynamicAllocation.enabled                     true
spark.dynamicAllocation.executorIdleTimeout         300s
spark.dynamicAllocation.minExecutors                0
spark.dynamicAllocation.maxExecutors                2
spark.dynamicAllocation.shuffleTracking.enabled     true

# --- Checkpointing ---
spark.sql.streaming.checkpointLocation  s3a://checkpoints/spark-streaming
