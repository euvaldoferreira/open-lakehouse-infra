# =============================================================================
# Trino — Apache Ranger Access Control
# Ativa quando a stack security estiver rodando (ranger-admin:6080).
#
# Requer: ranger-trino-plugin JAR no diretório de plugins do Trino.
# Em trinodb/trino:443, o plugin está disponível em:
#   /usr/lib/trino/plugin/ranger/
#
# Para ativar: descomente as linhas abaixo e reinicie o Trino.
# =============================================================================

# access-control.name=ranger
# ranger.service-type=trino
# ranger.service-name=lakehouse-trino
# ranger.policy-repository-name=lakehouse-trino
# ranger.admin-url=http://ranger-admin:6080
# ranger.authentication-type=NONE
# ranger.http.connect.timeout.millis=30000
# ranger.http.read.timeout.millis=30000
# ranger.policy-refresh-interval=30s

# --- Fallback (permite tudo enquanto Ranger não está ativo) ---
access-control.name=allow-all
