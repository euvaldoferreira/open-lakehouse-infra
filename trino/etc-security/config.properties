coordinator=true
node-scheduler.include-coordinator=true
http-server.http.port=8080
discovery.uri=http://trino:8080
query.max-memory=1GB
query.max-memory-per-node=512MB
query.max-stage-count=150
task.max-worker-threads=8

# =============================================================================
# JWT Authentication via Keycloak
# Ativado pela security stack (docker-compose.security.yml).
# Tokens são emitidos pelo Keycloak e validados via JWKS endpoint.
# =============================================================================
http-server.authentication.type=JWT
http-server.authentication.jwt.key-file=http://keycloak:8080/realms/lakehouse/protocol/openid-connect/certs
http-server.authentication.jwt.required-issuer=http://keycloak:8080/realms/lakehouse
http-server.authentication.jwt.required-audience=trino

# Web UI usa o mesmo mecanismo JWT
web-ui.authentication.type=JWT
